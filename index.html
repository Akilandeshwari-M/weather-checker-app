<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
        }

        .page {
            display: none;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 40px 20px;
        }

        .active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Hero / Front Page Styling */
        .hero-title {
            font-size: 3rem;
            color: #1e293b;
            margin-bottom: 10px;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: #64748b;
            margin-bottom: 30px;
        }

        .btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        /* Weather Page Styling */
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }

        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <!-- PAGE 1: Front / Landing Page -->
    <div id="page1" class="page active">
        <h1 class="hero-title">Welcome to Weather Checker</h1>
        <p class="hero-subtitle">Get real-time weather updates for your favorite cities around the globe.</p>
        <button class="btn" onclick="showPage('page2')">Check Weather Now</button>
    </div>

    <!-- PAGE 2: Weather Checker App Page -->
    <div id="page2" class="page">
        <div class="card">
            <h2>Weather Search</h2>
            <input type="text" id="cityInput" placeholder="Enter city name (e.g., London)">
            <br>
            <button class="btn" onclick="getWeather()">Search</button>
            <div id="result" style="margin-top: 20px;"></div>
            <br>
            <button class="btn" style="background-color: #64748b;" onclick="showPage('page1')">← Back to Home</button>
        </div>
    </div>

    <script>
        // Function to toggle between views
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // Function to call your backend Express API
        async function getWeather() {
            const city = document.getElementById('cityInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!city) {
                resultDiv.innerHTML = '<p style="color:red;">Please enter a city name.</p>';
                return;
            }

            resultDiv.innerHTML = 'Loading...';

            try {
                const response = await fetch(`/weather?city=${encodeURIComponent(city)}`);
                const data = await response.json();

                if (data.message) {
                    resultDiv.innerHTML = `<p><strong>Condition:</strong> ${data.message}</p>`;
                } else {
                    resultDiv.innerHTML = '<p style="color:red;">Could not fetch weather data.</p>';
                }
            } catch (err) {
                resultDiv.innerHTML = '<p style="color:red;">Error connecting to server.</p>';
            }
        }
    </script>
</body>
</html>
